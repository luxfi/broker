name: Docker Multi-Arch

on:
  push:
    branches: [main, dev]

permissions:
  contents: read
  packages: write

jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/luxfi/broker
      platforms: linux/amd64,linux/arm64
    secrets: inherit
